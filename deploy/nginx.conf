# ============================================
# Nginx reverse proxy for Cargo Marketplace
# ============================================

# Rate limiting zone
limit_req_zone $binary_remote_addr zone=api:10m rate=100r/m;
limit_req_zone $binary_remote_addr zone=login:10m rate=5r/m;

# Upstream Next.js app
upstream nextjs {
    server web:3000;
}

# HTTP server — serves certbot challenges + proxy to app
server {
    listen 80;
    server_name cargomarketplace.ru www.cargomarketplace.ru;

    # Certbot challenge
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    # Redirect HTTP to HTTPS
    location / {
        return 301 https://$host$request_uri;
    }
}

# HTTPS server
server {
    listen 443 ssl;
    server_name cargomarketplace.ru www.cargomarketplace.ru;

    ssl_certificate /etc/letsencrypt/live/cargomarketplace.ru/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/cargomarketplace.ru/privkey.pem;

    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;

    location / {
        proxy_pass http://nextjs;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
